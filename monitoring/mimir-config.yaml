target: all
multitenancy_enabled: false

server:
  http_listen_port: 9009

# Добавляем memberlist для координации
memberlist:
  join_members:
    - mimir:7946

distributor:
  ring:
    kvstore:
      store: memberlist

ingester:
  ring:
    kvstore:
      store: memberlist
    replication_factor: 1

blocks_storage:
  backend: filesystem
  filesystem:
    dir: /data/blocks
  tsdb:
    dir: /data/tsdb
    retention_period: 2160h

compactor:
  data_dir: /data/compactor
  compaction_interval: 30m
  deletion_delay: 2h

limits:
  ingestion_rate: 1000000
  ingestion_burst_size: 2000000
  max_global_series_per_user: 1000000
  max_global_series_per_metric: 20000
