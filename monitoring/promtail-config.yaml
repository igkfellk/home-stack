server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  - job_name: containers
    static_configs:
      - targets:
          - localhost
        labels:
          job: container_logs
          __path__: /var/lib/docker/containers/*/*.log

    pipeline_stages:
      - json:
          expressions:
            log: log
            time: time
            stream: stream
      - json:
          expressions:
            level: log
          source: log
      - regex:
          expression: '.*"level":"(?P<level>\w+)".*'
      - labels:
          level:
      - timestamp:
          source: time
          format: RFC3339Nano
      - output:
          source: log
